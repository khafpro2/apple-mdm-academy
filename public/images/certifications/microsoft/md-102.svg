<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <defs>
    <linearGradient id="bgMD102" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8"/>
      <stop offset="45%" style="stop-color:#0078D4"/>
      <stop offset="100%" style="stop-color:#003A8C"/>
    </linearGradient>
    <linearGradient id="shineMD102" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.20"/>
      <stop offset="55%" style="stop-color:#FFFFFF;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadowMD102">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#001A4D" flood-opacity="0.65"/>
    </filter>
    <filter id="glowMD102">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <polygon points="160,14 278,82 278,214 160,282 42,214 42,82"
    fill="#001A4D" opacity="0.4" transform="translate(0,14)" filter="url(#shadowMD102)"/>
  <polygon points="160,14 278,82 278,214 160,282 42,214 42,82"
    fill="url(#bgMD102)"/>
  <polygon points="160,14 278,82 278,214 160,282 42,214 42,82"
    fill="url(#shineMD102)"/>
  <polygon points="160,24 268,88 268,210 160,272 52,210 52,88"
    fill="none" stroke="#60A5FA" stroke-width="2" opacity="0.55"/>
  <polygon points="160,38 254,96 254,202 160,258 66,202 66,96"
    fill="none" stroke="#BAE6FD" stroke-width="1" opacity="0.18"/>

  <text x="160" y="64" font-family="'Arial', Helvetica, sans-serif"
    font-size="9" font-weight="700" fill="#BAE6FD" text-anchor="middle"
    letter-spacing="5" opacity="0.65">MICROSOFT</text>

  <!-- Symbole : 4 carrés logo Microsoft (2×2) -->
  <g transform="translate(160, 148)" filter="url(#glowMD102)">
    <!-- Carré rouge (haut gauche) -->
    <rect x="-36" y="-36" width="30" height="30" rx="3" fill="#F25022" opacity="0.95"/>
    <!-- Carré vert (haut droite) -->
    <rect x="-2" y="-36" width="30" height="30" rx="3" fill="#7FBA00" opacity="0.95"/>
    <!-- Carré bleu (bas gauche) -->
    <rect x="-36" y="-2" width="30" height="30" rx="3" fill="#00A4EF" opacity="0.95"/>
    <!-- Carré jaune (bas droite) -->
    <rect x="-2" y="-2" width="30" height="30" rx="3" fill="#FFB900" opacity="0.95"/>
  </g>

  <line x1="96" y1="196" x2="224" y2="196" stroke="#60A5FA" stroke-width="1" opacity="0.30"/>

  <text x="160" y="222" font-family="'Arial Black', 'Impact', Arial, sans-serif"
    font-size="34" font-weight="900" fill="white" text-anchor="middle"
    dominant-baseline="middle" letter-spacing="2" opacity="0.96">MD-102</text>

  <text x="160" y="248" font-family="Arial, Helvetica, sans-serif"
    font-size="8.5" font-weight="700" fill="#BAE6FD" text-anchor="middle"
    letter-spacing="4" opacity="0.88">ENDPOINT</text>

  <text x="160" y="265" font-family="Arial, Helvetica, sans-serif"
    font-size="7" font-weight="600" fill="#7DD3FC" text-anchor="middle"
    letter-spacing="2" opacity="0.70">ADMINISTRATOR</text>

  <circle cx="160" cy="19" r="5" fill="#BAE6FD" opacity="0.90" filter="url(#glowMD102)"/>
  <circle cx="160" cy="277" r="4.5" fill="#60A5FA" opacity="0.80"/>
  <circle cx="48" cy="92" r="3" fill="#38BDF8" opacity="0.60"/>
  <circle cx="272" cy="92" r="3" fill="#38BDF8" opacity="0.60"/>
  <circle cx="48" cy="208" r="3" fill="#38BDF8" opacity="0.60"/>
  <circle cx="272" cy="208" r="3" fill="#38BDF8" opacity="0.60"/>
</svg>
