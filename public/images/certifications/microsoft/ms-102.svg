<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <defs>
    <linearGradient id="bgMS102" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="45%" style="stop-color:#5B21B6"/>
      <stop offset="100%" style="stop-color:#2D1B69"/>
    </linearGradient>
    <linearGradient id="shineMS102" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.20"/>
      <stop offset="55%" style="stop-color:#FFFFFF;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadowMS102">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1E0A47" flood-opacity="0.65"/>
    </filter>
    <filter id="glowMS102">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <polygon points="160,14 278,82 278,214 160,282 42,214 42,82"
    fill="#1E0A47" opacity="0.4" transform="translate(0,14)" filter="url(#shadowMS102)"/>
  <polygon points="160,14 278,82 278,214 160,282 42,214 42,82"
    fill="url(#bgMS102)"/>
  <polygon points="160,14 278,82 278,214 160,282 42,214 42,82"
    fill="url(#shineMS102)"/>
  <polygon points="160,24 268,88 268,210 160,272 52,210 52,88"
    fill="none" stroke="#A78BFA" stroke-width="2" opacity="0.55"/>
  <polygon points="160,38 254,96 254,202 160,258 66,202 66,96"
    fill="none" stroke="#DDD6FE" stroke-width="1" opacity="0.18"/>

  <text x="160" y="64" font-family="'Arial', Helvetica, sans-serif"
    font-size="9" font-weight="700" fill="#EDE9FE" text-anchor="middle"
    letter-spacing="5" opacity="0.65">MICROSOFT</text>

  <!-- Symbole : Couronne (niveau Expert Enterprise) -->
  <g transform="translate(160, 148)" filter="url(#glowMS102)">
    <!-- Base couronne -->
    <rect x="-42" y="16" width="84" height="16" rx="4" fill="white" opacity="0.93"/>
    <!-- Corps couronne -->
    <path d="M-42,16 L-42,-14 L-24,4 L0,-26 L24,4 L42,-14 L42,16 Z"
      fill="white" opacity="0.93"/>
    <!-- 3 joyaux sur les pointes -->
    <circle cx="0" cy="-28" r="5.5" fill="#C4B5FD" opacity="0.95"/>
    <circle cx="-44" cy="-16" r="4" fill="#A78BFA" opacity="0.90"/>
    <circle cx="44" cy="-16" r="4" fill="#A78BFA" opacity="0.90"/>
  </g>

  <line x1="96" y1="196" x2="224" y2="196" stroke="#A78BFA" stroke-width="1" opacity="0.30"/>

  <text x="160" y="222" font-family="'Arial Black', 'Impact', Arial, sans-serif"
    font-size="34" font-weight="900" fill="white" text-anchor="middle"
    dominant-baseline="middle" letter-spacing="2" opacity="0.96">MS-102</text>

  <text x="160" y="248" font-family="Arial, Helvetica, sans-serif"
    font-size="8.5" font-weight="700" fill="#EDE9FE" text-anchor="middle"
    letter-spacing="4" opacity="0.88">ENTERPRISE</text>

  <text x="160" y="265" font-family="Arial, Helvetica, sans-serif"
    font-size="7" font-weight="600" fill="#C4B5FD" text-anchor="middle"
    letter-spacing="2" opacity="0.70">ADMINISTRATOR</text>

  <circle cx="160" cy="19" r="5" fill="#EDE9FE" opacity="0.90" filter="url(#glowMS102)"/>
  <circle cx="160" cy="277" r="4.5" fill="#A78BFA" opacity="0.80"/>
  <circle cx="48" cy="92" r="3" fill="#8B5CF6" opacity="0.60"/>
  <circle cx="272" cy="92" r="3" fill="#8B5CF6" opacity="0.60"/>
  <circle cx="48" cy="208" r="3" fill="#8B5CF6" opacity="0.60"/>
  <circle cx="272" cy="208" r="3" fill="#8B5CF6" opacity="0.60"/>
</svg>
