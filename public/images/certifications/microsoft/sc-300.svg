<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <defs>
    <linearGradient id="bgSC300" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2DD4BF"/>
      <stop offset="45%" style="stop-color:#0D9488"/>
      <stop offset="100%" style="stop-color:#042F2E"/>
    </linearGradient>
    <linearGradient id="shineSC300" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.18"/>
      <stop offset="55%" style="stop-color:#FFFFFF;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadowSC300">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#011515" flood-opacity="0.65"/>
    </filter>
    <filter id="glowSC300">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <polygon points="160,14 278,82 278,214 160,282 42,214 42,82"
    fill="#011515" opacity="0.4" transform="translate(0,14)" filter="url(#shadowSC300)"/>
  <polygon points="160,14 278,82 278,214 160,282 42,214 42,82"
    fill="url(#bgSC300)"/>
  <polygon points="160,14 278,82 278,214 160,282 42,214 42,82"
    fill="url(#shineSC300)"/>
  <polygon points="160,24 268,88 268,210 160,272 52,210 52,88"
    fill="none" stroke="#5EEAD4" stroke-width="2" opacity="0.55"/>
  <polygon points="160,38 254,96 254,202 160,258 66,202 66,96"
    fill="none" stroke="#99F6E4" stroke-width="1" opacity="0.18"/>

  <text x="160" y="64" font-family="'Arial', Helvetica, sans-serif"
    font-size="9" font-weight="700" fill="#CCFBF1" text-anchor="middle"
    letter-spacing="5" opacity="0.65">MICROSOFT</text>

  <!-- Symbole : Empreinte digitale (arcs concentriques) -->
  <g transform="translate(160, 148)" filter="url(#glowSC300)">
    <!-- Arc ext -->
    <path d="M-40,10 Q-40,-50 0,-50 Q40,-50 40,10"
      fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round" opacity="0.88"/>
    <!-- Arc 2 -->
    <path d="M-28,10 Q-28,-36 0,-36 Q28,-36 28,10"
      fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.82"/>
    <!-- Arc 3 -->
    <path d="M-16,10 Q-16,-22 0,-22 Q16,-22 16,10"
      fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.76"/>
    <!-- Arc 4 -->
    <path d="M-6,10 Q-6,-10 0,-10 Q6,-10 6,10"
      fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.70"/>
    <!-- Ligne base -->
    <line x1="-44" y1="10" x2="44" y2="10" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.60"/>
  </g>

  <line x1="96" y1="196" x2="224" y2="196" stroke="#5EEAD4" stroke-width="1" opacity="0.30"/>

  <text x="160" y="222" font-family="'Arial Black', 'Impact', Arial, sans-serif"
    font-size="34" font-weight="900" fill="white" text-anchor="middle"
    dominant-baseline="middle" letter-spacing="2" opacity="0.96">SC-300</text>

  <text x="160" y="248" font-family="Arial, Helvetica, sans-serif"
    font-size="8.5" font-weight="700" fill="#CCFBF1" text-anchor="middle"
    letter-spacing="4" opacity="0.88">IDENTITY</text>

  <text x="160" y="265" font-family="Arial, Helvetica, sans-serif"
    font-size="7" font-weight="600" fill="#5EEAD4" text-anchor="middle"
    letter-spacing="2" opacity="0.70">ADMINISTRATOR</text>

  <circle cx="160" cy="19" r="5" fill="#CCFBF1" opacity="0.90" filter="url(#glowSC300)"/>
  <circle cx="160" cy="277" r="4.5" fill="#5EEAD4" opacity="0.80"/>
  <circle cx="48" cy="92" r="3" fill="#2DD4BF" opacity="0.60"/>
  <circle cx="272" cy="92" r="3" fill="#2DD4BF" opacity="0.60"/>
  <circle cx="48" cy="208" r="3" fill="#2DD4BF" opacity="0.60"/>
  <circle cx="272" cy="208" r="3" fill="#2DD4BF" opacity="0.60"/>
</svg>
