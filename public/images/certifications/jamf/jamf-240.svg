<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <defs>
    <linearGradient id="bg240" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE"/>
      <stop offset="45%" style="stop-color:#0891B2"/>
      <stop offset="100%" style="stop-color:#164E63"/>
    </linearGradient>
    <linearGradient id="shine240" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.20"/>
      <stop offset="55%" style="stop-color:#FFFFFF;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow240">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#083344" flood-opacity="0.65"/>
    </filter>
    <filter id="glow240">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <polygon points="160,14 278,82 278,214 160,282 42,214 42,82"
    fill="#083344" opacity="0.4" transform="translate(0,14)" filter="url(#shadow240)"/>
  <polygon points="160,14 278,82 278,214 160,282 42,214 42,82"
    fill="url(#bg240)"/>
  <polygon points="160,14 278,82 278,214 160,282 42,214 42,82"
    fill="url(#shine240)"/>
  <polygon points="160,24 268,88 268,210 160,272 52,210 52,88"
    fill="none" stroke="#67E8F9" stroke-width="2" opacity="0.55"/>
  <polygon points="160,38 254,96 254,202 160,258 66,202 66,96"
    fill="none" stroke="#CFFAFE" stroke-width="1" opacity="0.18"/>

  <text x="160" y="62" font-family="'Arial', Helvetica, sans-serif"
    font-size="9" font-weight="700" fill="#CFFAFE" text-anchor="middle"
    letter-spacing="5" opacity="0.65">JAMF</text>

  <!-- Symbole iPhone + iPad silhouettes -->
  <g transform="translate(160, 145)" filter="url(#glow240)">
    <!-- iPhone (gauche) -->
    <rect x="-44" y="-36" width="30" height="52" rx="5" fill="none" stroke="white" stroke-width="3.5" opacity="0.92"/>
    <rect x="-36" y="-26" width="14" height="28" rx="2" fill="white" opacity="0.35"/>
    <circle cx="-29" cy="20" r="3.5" fill="white" opacity="0.80"/>
    <!-- iPad (droite) -->
    <rect x="-2" y="-40" width="40" height="56" rx="5" fill="none" stroke="white" stroke-width="3.5" opacity="0.92"/>
    <rect x="4" y="-30" width="28" height="36" rx="2" fill="white" opacity="0.30"/>
    <circle cx="18" cy="22" r="4" fill="white" opacity="0.80"/>
  </g>

  <line x1="96" y1="196" x2="224" y2="196" stroke="#67E8F9" stroke-width="1.5" opacity="0.30"/>

  <text x="160" y="213" font-family="'Arial Black', 'Impact', Arial, sans-serif"
    font-size="40" font-weight="900" fill="white" text-anchor="middle"
    dominant-baseline="middle" letter-spacing="4" opacity="0.96">240</text>

  <text x="160" y="240" font-family="Arial, Helvetica, sans-serif"
    font-size="10" font-weight="700" fill="#CFFAFE" text-anchor="middle"
    letter-spacing="6" opacity="0.90">COURSE</text>

  <text x="160" y="259" font-family="Arial, Helvetica, sans-serif"
    font-size="7.5" font-weight="600" fill="#67E8F9" text-anchor="middle"
    letter-spacing="1.5" opacity="0.72">iOS / iPadOS</text>

  <circle cx="160" cy="20" r="5.5" fill="#CFFAFE" opacity="0.90" filter="url(#glow240)"/>
  <circle cx="160" cy="276" r="4.5" fill="#67E8F9" opacity="0.80"/>
  <circle cx="48" cy="92" r="3.5" fill="#22D3EE" opacity="0.60"/>
  <circle cx="272" cy="92" r="3.5" fill="#22D3EE" opacity="0.60"/>
  <circle cx="48" cy="208" r="3.5" fill="#22D3EE" opacity="0.60"/>
  <circle cx="272" cy="208" r="3.5" fill="#22D3EE" opacity="0.60"/>
</svg>
