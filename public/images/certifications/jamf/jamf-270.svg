<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <defs>
    <linearGradient id="bg270" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F87171"/>
      <stop offset="45%" style="stop-color:#DC2626"/>
      <stop offset="100%" style="stop-color:#7F1D1D"/>
    </linearGradient>
    <linearGradient id="shine270" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.20"/>
      <stop offset="55%" style="stop-color:#FFFFFF;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow270">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#450A0A" flood-opacity="0.65"/>
    </filter>
    <filter id="glow270">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <polygon points="160,14 278,82 278,214 160,282 42,214 42,82"
    fill="#450A0A" opacity="0.4" transform="translate(0,14)" filter="url(#shadow270)"/>
  <polygon points="160,14 278,82 278,214 160,282 42,214 42,82"
    fill="url(#bg270)"/>
  <polygon points="160,14 278,82 278,214 160,282 42,214 42,82"
    fill="url(#shine270)"/>
  <polygon points="160,24 268,88 268,210 160,272 52,210 52,88"
    fill="none" stroke="#FCA5A5" stroke-width="2" opacity="0.55"/>
  <polygon points="160,38 254,96 254,202 160,258 66,202 66,96"
    fill="none" stroke="#FECACA" stroke-width="1" opacity="0.18"/>

  <text x="160" y="62" font-family="'Arial', Helvetica, sans-serif"
    font-size="9" font-weight="700" fill="#FECACA" text-anchor="middle"
    letter-spacing="5" opacity="0.65">JAMF</text>

  <!-- Symbole : Radar circulaire (détection menaces) -->
  <g transform="translate(160, 144)" filter="url(#glow270)">
    <!-- Arcs radar concentriques -->
    <circle cx="0" cy="0" r="46" fill="none" stroke="white" stroke-width="2.5" opacity="0.80"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="white" stroke-width="2" opacity="0.65"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="white" stroke-width="1.5" opacity="0.50"/>
    <!-- Croix cible -->
    <line x1="0" y1="-50" x2="0" y2="50" stroke="white" stroke-width="1.5" opacity="0.40"/>
    <line x1="-50" y1="0" x2="50" y2="0" stroke="white" stroke-width="1.5" opacity="0.40"/>
    <!-- Point central (menace détectée) -->
    <circle cx="0" cy="0" r="6" fill="white" opacity="0.95"/>
    <!-- Point menace (position aléatoire sur arc) -->
    <circle cx="24" cy="-18" r="4.5" fill="#FCA5A5" opacity="0.95"/>
    <!-- Ligne de scan -->
    <path d="M0,0 L38,-28" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.70"/>
    <!-- Balayage radar (arc 60°) -->
    <path d="M0,0 L46,0 A46,46 0 0,1 23,-40 Z"
      fill="white" opacity="0.08"/>
  </g>

  <line x1="96" y1="196" x2="224" y2="196" stroke="#FCA5A5" stroke-width="1.5" opacity="0.30"/>

  <text x="160" y="213" font-family="'Arial Black', 'Impact', Arial, sans-serif"
    font-size="40" font-weight="900" fill="white" text-anchor="middle"
    dominant-baseline="middle" letter-spacing="4" opacity="0.96">270</text>

  <text x="160" y="240" font-family="Arial, Helvetica, sans-serif"
    font-size="10" font-weight="700" fill="#FECACA" text-anchor="middle"
    letter-spacing="6" opacity="0.90">COURSE</text>

  <text x="160" y="259" font-family="Arial, Helvetica, sans-serif"
    font-size="7.5" font-weight="600" fill="#FCA5A5" text-anchor="middle"
    letter-spacing="1.5" opacity="0.72">JAMF PROTECT</text>

  <circle cx="160" cy="20" r="5.5" fill="#FECACA" opacity="0.90" filter="url(#glow270)"/>
  <circle cx="160" cy="276" r="4.5" fill="#FCA5A5" opacity="0.80"/>
  <circle cx="48" cy="92" r="3.5" fill="#F87171" opacity="0.60"/>
  <circle cx="272" cy="92" r="3.5" fill="#F87171" opacity="0.60"/>
  <circle cx="48" cy="208" r="3.5" fill="#F87171" opacity="0.60"/>
  <circle cx="272" cy="208" r="3.5" fill="#F87171" opacity="0.60"/>
</svg>
