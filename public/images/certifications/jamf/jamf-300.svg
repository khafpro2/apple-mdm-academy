<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <defs>
    <linearGradient id="bg300" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="50%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#064E3B"/>
    </linearGradient>
    <linearGradient id="shine300" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.18"/>
      <stop offset="60%" style="stop-color:#FFFFFF;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="ring300" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A7F3D0;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="shadow300">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#064E3B" flood-opacity="0.6"/>
    </filter>
    <filter id="glow300">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <polygon points="160,16 276,82 276,214 160,280 44,214 44,82"
    fill="#022C22" opacity="0.4" transform="translate(0,14)" filter="url(#shadow300)"/>
  <polygon points="160,16 276,82 276,214 160,280 44,214 44,82"
    fill="url(#bg300)"/>
  <polygon points="160,16 276,82 276,214 160,280 44,214 44,82"
    fill="url(#shine300)"/>
  <polygon points="160,28 264,90 264,206 160,268 56,206 56,90"
    fill="none" stroke="url(#ring300)" stroke-width="2.5"/>
  <polygon points="160,44 248,98 248,198 160,252 72,198 72,98"
    fill="none" stroke="#6EE7B7" stroke-width="1" opacity="0.25"/>

  <!-- Shield Admin -->
  <path d="M160,36 L174,44 L174,62 Q174,74 160,80 Q146,74 146,62 L146,44 Z"
    fill="none" stroke="#A7F3D0" stroke-width="2" opacity="0.8"/>
  <path d="M155,60 L159,65 L167,55"
    fill="none" stroke="#D1FAE5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <g transform="translate(160, 114)" filter="url(#glow300)">
    <rect x="-9" y="-30" width="18" height="48" rx="9" fill="white" opacity="0.96"/>
    <path d="M-9,12 Q-26,20 -26,36 Q-26,52 -9,54 Q0,56 9,50"
      fill="none" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.96"/>
    <rect x="-24" y="-30" width="34" height="15" rx="7.5" fill="white" opacity="0.96"/>
  </g>

  <line x1="96" y1="170" x2="224" y2="170" stroke="#A7F3D0" stroke-width="1.5" opacity="0.4"/>

  <text x="160" y="202" font-family="'Arial Black', 'Impact', Arial, sans-serif"
    font-size="40" font-weight="900" fill="white" text-anchor="middle"
    dominant-baseline="middle" letter-spacing="4" opacity="0.97">300</text>

  <text x="160" y="233" font-family="Arial, Helvetica, sans-serif"
    font-size="10" font-weight="700" fill="#D1FAE5" text-anchor="middle"
    letter-spacing="6" opacity="0.9">COURSE</text>

  <text x="160" y="252" font-family="Arial, Helvetica, sans-serif"
    font-size="7.5" font-weight="600" fill="#6EE7B7" text-anchor="middle"
    letter-spacing="1.5" opacity="0.75">CERTIFIED ADMIN</text>

  <circle cx="160" cy="22" r="5" fill="#D1FAE5" opacity="0.9" filter="url(#glow300)"/>
  <circle cx="160" cy="274" r="4.5" fill="#6EE7B7" opacity="0.8"/>
  <circle cx="56" cy="96" r="3.5" fill="#34D399" opacity="0.65"/>
  <circle cx="264" cy="96" r="3.5" fill="#34D399" opacity="0.65"/>
  <circle cx="56" cy="200" r="3.5" fill="#34D399" opacity="0.65"/>
  <circle cx="264" cy="200" r="3.5" fill="#34D399" opacity="0.65"/>
</svg>
