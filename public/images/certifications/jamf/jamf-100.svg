<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <defs>
    <!-- Dégradés violet Jamf 100 -->
    <linearGradient id="bg100" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7"/>
      <stop offset="50%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#4C1D95"/>
    </linearGradient>
    <linearGradient id="shine100" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.18"/>
      <stop offset="60%" style="stop-color:#FFFFFF;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="ring100" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E9D5FF;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="shadow100">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#4C1D95" flood-opacity="0.6"/>
    </filter>
    <filter id="glow100">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="hex100">
      <polygon points="160,16 276,82 276,214 160,280 44,214 44,82"/>
    </clipPath>
  </defs>

  <!-- Ombre -->
  <polygon points="160,16 276,82 276,214 160,280 44,214 44,82"
    fill="#3B0764" opacity="0.4" transform="translate(0,14)" filter="url(#shadow100)"/>

  <!-- Corps principal -->
  <polygon points="160,16 276,82 276,214 160,280 44,214 44,82"
    fill="url(#bg100)"/>

  <!-- Reflet surface -->
  <polygon points="160,16 276,82 276,214 160,280 44,214 44,82"
    fill="url(#shine100)"/>

  <!-- Anneau extérieur -->
  <polygon points="160,28 264,90 264,206 160,268 56,206 56,90"
    fill="none" stroke="url(#ring100)" stroke-width="2.5"/>

  <!-- Anneau intérieur décoratif -->
  <polygon points="160,44 248,98 248,198 160,252 72,198 72,98"
    fill="none" stroke="#C4B5FD" stroke-width="1" opacity="0.25"/>

  <!-- Logo JAMF stylisé — J blanc -->
  <g transform="translate(160, 110)" filter="url(#glow100)">
    <!-- Barre verticale du J -->
    <rect x="-9" y="-32" width="18" height="52" rx="9" fill="white" opacity="0.96"/>
    <!-- Courbe bas du J -->
    <path d="M-9,14 Q-26,22 -26,38 Q-26,56 -9,58 Q0,60 9,54"
      fill="none" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.96"/>
    <!-- Empattement haut -->
    <rect x="-24" y="-32" width="34" height="16" rx="8" fill="white" opacity="0.96"/>
  </g>

  <!-- Séparateur -->
  <line x1="96" y1="170" x2="224" y2="170" stroke="#DDD6FE" stroke-width="1.5" opacity="0.4"/>

  <!-- Numéro 100 -->
  <text x="160" y="202" font-family="'Arial Black', 'Impact', Arial, sans-serif"
    font-size="40" font-weight="900" fill="white" text-anchor="middle"
    dominant-baseline="middle" letter-spacing="4" opacity="0.97">100</text>

  <!-- Label COURSE -->
  <text x="160" y="233" font-family="Arial, Helvetica, sans-serif"
    font-size="10" font-weight="700" fill="#E9D5FF" text-anchor="middle"
    letter-spacing="6" opacity="0.9">COURSE</text>

  <!-- Sous-titre certification -->
  <text x="160" y="252" font-family="Arial, Helvetica, sans-serif"
    font-size="7.5" font-weight="600" fill="#C4B5FD" text-anchor="middle"
    letter-spacing="1.5" opacity="0.75">CERTIFIED ASSOCIATE</text>

  <!-- Points décoratifs aux sommets -->
  <circle cx="160" cy="22" r="5" fill="#E9D5FF" opacity="0.9" filter="url(#glow100)"/>
  <circle cx="160" cy="274" r="4.5" fill="#C4B5FD" opacity="0.8"/>
  <circle cx="56" cy="96" r="3.5" fill="#A78BFA" opacity="0.65"/>
  <circle cx="264" cy="96" r="3.5" fill="#A78BFA" opacity="0.65"/>
  <circle cx="56" cy="200" r="3.5" fill="#A78BFA" opacity="0.65"/>
  <circle cx="264" cy="200" r="3.5" fill="#A78BFA" opacity="0.65"/>
</svg>
