<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg100" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#4C1D95"/>
    </linearGradient>
    <filter id="shadow100">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#7C3AED" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Hexagone externe -->
  <polygon points="100,8 185,52 185,148 100,192 15,148 15,52" fill="url(#bg100)" filter="url(#shadow100)"/>
  <!-- Hexagone interne (bordure) -->
  <polygon points="100,18 175,58 175,142 100,182 25,142 25,58" fill="none" stroke="#A78BFA" stroke-width="1.5" opacity="0.6"/>
  <!-- Logo Jamf J stylisé -->
  <text x="100" y="82" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="middle">J</text>
  <!-- Ligne décorative -->
  <line x1="60" y1="95" x2="140" y2="95" stroke="#A78BFA" stroke-width="1" opacity="0.7"/>
  <!-- Numéro de cours -->
  <text x="100" y="118" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="white" text-anchor="middle" dominant-baseline="middle">100</text>
  <!-- Label course -->
  <text x="100" y="148" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#DDD6FE" text-anchor="middle" letter-spacing="2">COURSE</text>
  <!-- Points décoratifs -->
  <circle cx="100" cy="28" r="3" fill="#A78BFA" opacity="0.8"/>
  <circle cx="100" cy="172" r="3" fill="#A78BFA" opacity="0.8"/>
</svg>
