<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <defs>
    <linearGradient id="bg400" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D97706"/>
      <stop offset="45%" style="stop-color:#B45309"/>
      <stop offset="100%" style="stop-color:#92400E"/>
    </linearGradient>
    <linearGradient id="ring400a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDE68A;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:0.3"/>
    </linearGradient>
    <radialGradient id="shine400" cx="30%" cy="25%" r="55%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </radialGradient>
    <filter id="drop400" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#78350F" flood-opacity="0.6"/>
    </filter>
    <filter id="glow400">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starGlow400">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <polygon points="140,14 244,72 244,188 140,246 36,188 36,72"
    fill="#78350F" opacity="0.35" transform="translate(0,10)" filter="url(#drop400)"/>
  <polygon points="140,14 244,72 244,188 140,246 36,188 36,72"
    fill="url(#bg400)"/>
  <polygon points="140,14 244,72 244,188 140,246 36,188 36,72"
    fill="url(#shine400)"/>
  <polygon points="140,24 234,78 234,182 140,236 46,182 46,78"
    fill="none" stroke="url(#ring400a)" stroke-width="2"/>
  <polygon points="140,38 220,86 220,174 140,222 60,174 60,86"
    fill="none" stroke="#FCD34D" stroke-width="1" opacity="0.35"/>

  <!-- Étoile Expert — au-dessus du J -->
  <polygon points="140,42 143.1,51.5 153,51.5 145.5,57.5 148.5,67 140,61 131.5,67 134.5,57.5 127,51.5 136.9,51.5"
    fill="#FDE68A" opacity="0.95" filter="url(#starGlow400)"/>

  <g transform="translate(140, 108)" filter="url(#glow400)">
    <rect x="-7" y="-24" width="14" height="42" rx="7" fill="white" opacity="0.97"/>
    <path d="M-7,12 Q-20,18 -20,30 Q-20,42 -7,44 Q0,45 7,41"
      fill="none" stroke="white" stroke-width="13" stroke-linecap="round" opacity="0.97"/>
    <rect x="-20" y="-24" width="27" height="13" rx="6.5" fill="white" opacity="0.97"/>
  </g>

  <line x1="84" y1="152" x2="196" y2="152" stroke="#FDE68A" stroke-width="1.5" opacity="0.5"/>

  <text x="140" y="182" font-family="'Arial Black', Arial, sans-serif"
    font-size="34" font-weight="900" fill="white" text-anchor="middle"
    dominant-baseline="middle" letter-spacing="3">400</text>

  <text x="140" y="212" font-family="Arial, sans-serif"
    font-size="9.5" font-weight="700" fill="#FDE68A" text-anchor="middle"
    letter-spacing="5" opacity="0.85">COURSE</text>

  <text x="140" y="232" font-family="Arial, sans-serif"
    font-size="7" font-weight="600" fill="#FCD34D" text-anchor="middle"
    letter-spacing="1" opacity="0.7">CERTIFIED EXPERT</text>

  <!-- Points coins avec éclat sur le dessus -->
  <circle cx="140" cy="20" r="5" fill="#FDE68A" opacity="0.95" filter="url(#starGlow400)"/>
  <circle cx="140" cy="240" r="4" fill="#FCD34D" opacity="0.85"/>
  <circle cx="48" cy="84" r="3" fill="#FCD34D" opacity="0.6"/>
  <circle cx="232" cy="84" r="3" fill="#FCD34D" opacity="0.6"/>
  <circle cx="48" cy="176" r="3" fill="#FCD34D" opacity="0.6"/>
  <circle cx="232" cy="176" r="3" fill="#FCD34D" opacity="0.6"/>
</svg>
