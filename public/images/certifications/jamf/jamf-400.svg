<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <defs>
    <linearGradient id="bg400" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="50%" style="stop-color:#D97706"/>
      <stop offset="100%" style="stop-color:#92400E"/>
    </linearGradient>
    <linearGradient id="shine400" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.22"/>
      <stop offset="60%" style="stop-color:#FFFFFF;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="ring400" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDE68A;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="shadow400">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#78350F" flood-opacity="0.65"/>
    </filter>
    <filter id="glow400">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <polygon points="160,16 276,82 276,214 160,280 44,214 44,82"
    fill="#451A03" opacity="0.45" transform="translate(0,14)" filter="url(#shadow400)"/>
  <polygon points="160,16 276,82 276,214 160,280 44,214 44,82"
    fill="url(#bg400)"/>
  <polygon points="160,16 276,82 276,214 160,280 44,214 44,82"
    fill="url(#shine400)"/>
  <polygon points="160,28 264,90 264,206 160,268 56,206 56,90"
    fill="none" stroke="url(#ring400)" stroke-width="2.5"/>
  <polygon points="160,44 248,98 248,198 160,252 72,198 72,98"
    fill="none" stroke="#FCD34D" stroke-width="1" opacity="0.3"/>

  <!-- Étoile Expert 5 branches -->
  <polygon points="160,36 164,48 177,48 167,56 171,68 160,60 149,68 153,56 143,48 156,48"
    fill="#FEF3C7" opacity="0.97" filter="url(#glow400)"/>

  <g transform="translate(160, 118)" filter="url(#glow400)">
    <rect x="-9" y="-28" width="18" height="46" rx="9" fill="white" opacity="0.96"/>
    <path d="M-9,12 Q-26,20 -26,36 Q-26,52 -9,54 Q0,56 9,50"
      fill="none" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.96"/>
    <rect x="-24" y="-28" width="34" height="15" rx="7.5" fill="white" opacity="0.96"/>
  </g>

  <line x1="96" y1="174" x2="224" y2="174" stroke="#FDE68A" stroke-width="1.5" opacity="0.45"/>

  <text x="160" y="206" font-family="'Arial Black', 'Impact', Arial, sans-serif"
    font-size="40" font-weight="900" fill="white" text-anchor="middle"
    dominant-baseline="middle" letter-spacing="4" opacity="0.97">400</text>

  <text x="160" y="237" font-family="Arial, Helvetica, sans-serif"
    font-size="10" font-weight="700" fill="#FEF3C7" text-anchor="middle"
    letter-spacing="6" opacity="0.9">COURSE</text>

  <text x="160" y="256" font-family="Arial, Helvetica, sans-serif"
    font-size="7.5" font-weight="600" fill="#FCD34D" text-anchor="middle"
    letter-spacing="1.5" opacity="0.78">CERTIFIED EXPERT</text>

  <!-- Coins avec éclat or -->
  <circle cx="160" cy="22" r="5.5" fill="#FEF3C7" opacity="0.95" filter="url(#glow400)"/>
  <circle cx="160" cy="274" r="4.5" fill="#FCD34D" opacity="0.85"/>
  <circle cx="56" cy="96" r="3.5" fill="#FBB840" opacity="0.65"/>
  <circle cx="264" cy="96" r="3.5" fill="#FBB840" opacity="0.65"/>
  <circle cx="56" cy="200" r="3.5" fill="#FBB840" opacity="0.65"/>
  <circle cx="264" cy="200" r="3.5" fill="#FBB840" opacity="0.65"/>
</svg>
