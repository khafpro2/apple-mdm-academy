<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <defs>
    <linearGradient id="bg200" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="50%" style="stop-color:#1D4ED8"/>
      <stop offset="100%" style="stop-color:#1E3A8A"/>
    </linearGradient>
    <linearGradient id="shine200" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.18"/>
      <stop offset="60%" style="stop-color:#FFFFFF;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="ring200" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#BFDBFE;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="shadow200">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1E3A8A" flood-opacity="0.6"/>
    </filter>
    <filter id="glow200">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <polygon points="160,16 276,82 276,214 160,280 44,214 44,82"
    fill="#172554" opacity="0.4" transform="translate(0,14)" filter="url(#shadow200)"/>
  <polygon points="160,16 276,82 276,214 160,280 44,214 44,82"
    fill="url(#bg200)"/>
  <polygon points="160,16 276,82 276,214 160,280 44,214 44,82"
    fill="url(#shine200)"/>
  <polygon points="160,28 264,90 264,206 160,268 56,206 56,90"
    fill="none" stroke="url(#ring200)" stroke-width="2.5"/>
  <polygon points="160,44 248,98 248,198 160,252 72,198 72,98"
    fill="none" stroke="#93C5FD" stroke-width="1" opacity="0.25"/>

  <!-- Chevrons niveau Tech (2 chevrons) -->
  <polyline points="142,54 155,44 168,54" fill="none" stroke="#93C5FD" stroke-width="2.5"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <polyline points="147,62 160,52 173,62" fill="none" stroke="#BFDBFE" stroke-width="2"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>

  <g transform="translate(160, 114)" filter="url(#glow200)">
    <rect x="-9" y="-30" width="18" height="48" rx="9" fill="white" opacity="0.96"/>
    <path d="M-9,12 Q-26,20 -26,36 Q-26,52 -9,54 Q0,56 9,50"
      fill="none" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.96"/>
    <rect x="-24" y="-30" width="34" height="15" rx="7.5" fill="white" opacity="0.96"/>
  </g>

  <line x1="96" y1="170" x2="224" y2="170" stroke="#BFDBFE" stroke-width="1.5" opacity="0.4"/>

  <text x="160" y="202" font-family="'Arial Black', 'Impact', Arial, sans-serif"
    font-size="40" font-weight="900" fill="white" text-anchor="middle"
    dominant-baseline="middle" letter-spacing="4" opacity="0.97">200</text>

  <text x="160" y="233" font-family="Arial, Helvetica, sans-serif"
    font-size="10" font-weight="700" fill="#DBEAFE" text-anchor="middle"
    letter-spacing="6" opacity="0.9">COURSE</text>

  <text x="160" y="252" font-family="Arial, Helvetica, sans-serif"
    font-size="7.5" font-weight="600" fill="#93C5FD" text-anchor="middle"
    letter-spacing="1.5" opacity="0.75">CERTIFIED TECH</text>

  <circle cx="160" cy="22" r="5" fill="#DBEAFE" opacity="0.9" filter="url(#glow200)"/>
  <circle cx="160" cy="274" r="4.5" fill="#93C5FD" opacity="0.8"/>
  <circle cx="56" cy="96" r="3.5" fill="#60A5FA" opacity="0.65"/>
  <circle cx="264" cy="96" r="3.5" fill="#60A5FA" opacity="0.65"/>
  <circle cx="56" cy="200" r="3.5" fill="#60A5FA" opacity="0.65"/>
  <circle cx="264" cy="200" r="3.5" fill="#60A5FA" opacity="0.65"/>
</svg>
